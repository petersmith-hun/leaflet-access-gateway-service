<!DOCTYPE html>
<html lang="hu" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/default}">
    <head>
        <title id="something" th:text="#{profile.main.title}">profile_main</title>
    </head>
    <body>
        <th:block layout:fragment="modal">
            <th:block th:if="${param.operation != null}">
                <div class="modal fade show" id="profileOperationResultModal" tabindex="-1" aria-labelledby="profileOperationResultModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="profileOperationResultModalLabel" th:text="#{flash.profile-update.success}">modal_title</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body" th:switch="${#strings.toString(param.operation)}">
                                <span th:case="'edit-account'" th:text="#{flash.profile-update.edit-account.result.success}"></span>
                                <span th:case="'change-password'" th:text="#{flash.profile-update.change-password.result.success}"></span>
                                <span th:case="*" th:text="#{flash.profile-update.unknown.result}"></span>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                            </div>
                        </div>
                    </div>
                </div>
                <script>
                    new bootstrap.Modal(document.getElementById('profileOperationResultModal'), {}).toggle();
                </script>
            </th:block>
        </th:block>

        <th:block layout:fragment="content">
            <div class="row justify-content-center">
                <div class="col-12 mt-3" style="text-align: center;">
                    <h3>
                        <span th:text="#{form.authorization.welcome_back}">welcome_back</span>
                        <br />
                        <i class="fab fa-google" th:if="${#strings.equals(accountData.accountType, 'GOOGLE')}"></i>
                        <i class="fab fa-github" th:if="${#strings.equals(accountData.accountType, 'GITHUB')}"></i>
                        <span style="font-weight: bold;" th:text="${accountData.username}"></span>
                    </h3>
                    <p>(<span th:text="${accountData.email}"></span>)</p>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-12">
                    <hr />
                </div>
            </div>
            <div class="row justify-content-center" th:if="${returnTo != null}">
                <div class="col-12">
                    <a class="btn btn-outline-success w-100 align-middle" th:href="${returnTo.returnUrl}">
                        <span th:text="#{profile.navigation.return(${returnTo.displayName})}">return_to_display_name</span> <i class="fas fa-chevron-circle-left"></i>
                    </a>
                </div>
            </div>
            <p>&nbsp;</p>
            <div class="row justify-content-center" th:if="${!localAccount}">
                <div class="col-12">
                    <p class="w-100 text-center border rounded rounded-3 border-3 border-danger text-danger">
                        <i class="fas fa-exclamation-circle"></i>
                        <span th:text="#{profile.label.non-local-account-warning}">non_local_account_warning</span>
                    </p>
                </div>
            </div>
            <div class="row justify-content-center" th:if="${localAccount}">
                <div class="col-12">
                    <a class="btn btn-primary w-100 align-middle" th:href="@{/profile/edit-account}">
                        <span th:text="#{profile.navigation.edit-account}">edit_account</span> <i class="fas fa-user-edit"></i>
                    </a>
                </div>
            </div>
            <div class="row mt-3 justify-content-center" th:if="${localAccount}">
                <div class="col-12">
                    <a class="btn btn-primary w-100 align-middle" th:href="@{/profile/change-password}">
                        <span th:text="#{profile.navigation.change-password}">change_password</span> <i class="fas fa-key"></i>
                    </a>
                </div>
            </div>
            <div class="row mt-3 justify-content-center">
                <div class="col-12">
                    <a class="btn btn-danger w-100 align-middle" th:href="@{/profile/delete-account}">
                        <span th:text="#{profile.navigation.delete-account}">delete_account</span> <i class="fas fa-times-circle"></i>
                    </a>
                </div>
            </div>
            <p>&nbsp;</p>
            <div class="row mt-3 justify-content-center">
                <div class="col-12">
                    <form th:action="@{/logout?logoutRef=__${logoutRef}__}" method="post" class="w-100">
                        <div class="mb-3">
                            <button type="submit" class="btn btn-secondary w-100 align-middle">
                                <span th:text="#{profile.navigation.sign-out}">its_not_me</span> <i class="fas fa-sign-out-alt"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </th:block>
    </body>
</html>
