<!DOCTYPE html>
<html lang="hu" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/default}">
    <head>
        <title th:text="#{profile.navigation.change-password}">profile_change_password</title>
    </head>
    <body>
        <th:block layout:fragment="modal">
            <th:block th:if="${param.status != null}">
                <div class="modal fade show" id="profileOperationResultModal" tabindex="-1" aria-labelledby="profileOperationResultModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="profileOperationResultModalLabel" th:text="#{flash.profile-update.failure}">modal_title</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body" th:switch="${#strings.toString(param.status)}">
                                <span th:case="'current-password-mismatch'" th:text="#{flash.profile-update.edit-account.result.current-password-mismatch}"></span>
                                <span th:case="'new-password-mismatch'" th:text="#{flash.profile-update.edit-account.result.new-password-mismatch}"></span>
                                <span th:case="*" th:text="#{flash.profile-update.unknown.result}"></span>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                            </div>
                        </div>
                    </div>
                </div>
                <script>
					new bootstrap.Modal(document.getElementById('profileOperationResultModal'), {}).toggle();
                </script>
            </th:block>
        </th:block>

        <th:block layout:fragment="content">
            <div class="row justify-content-center">
                <div class="col-12 mt-3" style="text-align: center;">
                    <h3 class="" th:text="#{profile.navigation.change-password}">placeholder:change_password</h3>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-12">
                    <form th:object="${passwordUpdateModel}" th:action="@{''}" method="post" accept-charset="utf-8">
                        <div class="mb-3">
                            <label for="currentPassword" th:text="#{form.profile-update.label.current-password}">placeholder:currentPassword</label>
                            <input name="currentPassword" class="form-control" required="required" maxlength="255" type="password" id="currentPassword" />
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" th:text="#{form.profile-update.label.new-password}">placeholder:newPassword</label>
                            <input name="newPassword" class="form-control" required="required" maxlength="255" type="password" id="newPassword" />
                        </div>
                        <div class="mb-3">
                            <label for="newPasswordConfirmation" th:text="#{form.profile-update.label.new-password-confirmation}">placeholder:newPasswordConfirmation</label>
                            <input name="newPasswordConfirmation" class="form-control" required="required" maxlength="255" type="password" id="newPasswordConfirmation" />
                        </div>
                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary w-100 mt-3 align-middle" th:text="#{form.profile-update.submit}">placeholder:submit</button>
                        </div>
                        <div class="mb-3">
                            <a class="btn btn-secondary w-100 align-middle" href="/" th:href="@{/profile}">
                                <span th:text="#{profile.navigation.cancel}">cancel</span> <i class="fas fa-angle-left"></i>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </th:block>
    </body>
</html>
